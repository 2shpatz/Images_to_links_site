# wrangler.toml – Cloudflare Worker with static assets
name = "images-to-links-site"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Static site files served automatically for non-API routes
[assets]
directory = "./site"

# KV namespace binding
[[kv_namespaces]]
binding = "SITE_DATA"
id = "004b3b22b5b64c5dba6266ea8abf9385"
